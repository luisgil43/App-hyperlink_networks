{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-100 flex items-center justify-center px-4">

  <div class="w-full max-w-xl bg-white rounded-3xl shadow-xl border border-gray-100 p-8 text-center">
    <div class="mx-auto w-20 h-20 rounded-3xl bg-red-50 text-red-600 flex items-center justify-center text-4xl mb-5">
      {{ icon }}
    </div>

    <h1 class="text-3xl font-extrabold text-gray-900">
      {{ title }}
    </h1>

    <p class="text-gray-600 mt-4 leading-relaxed">
      {{ message }}
    </p>

    {% if package %}
      <div class="mt-6 rounded-2xl bg-gray-50 border border-gray-100 p-4 text-left">
        <p class="text-xs font-bold text-gray-500 uppercase tracking-wide">
          Package
        </p>

        <p class="text-sm font-bold text-gray-900 mt-1 break-words">
          {{ package.name }}
        </p>
      </div>
    {% endif %}

    <div class="mt-6 rounded-2xl bg-blue-50 border border-blue-100 p-4 text-sm text-blue-800">
      Please request a new secure delivery link if you still need access to these files.
    </div>
  </div>

</body>
</html>
