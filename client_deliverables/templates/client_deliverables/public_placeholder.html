<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title|default:"Delivery Notice" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-100 text-gray-900">

  <div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-xl bg-white rounded-3xl shadow-xl border border-gray-100 p-8 text-center">

      <div class="w-16 h-16 mx-auto rounded-3xl bg-amber-100 text-amber-700 flex items-center justify-center text-3xl">
        🚧
      </div>

      <h1 class="text-2xl font-extrabold text-gray-900 mt-5">
        {{ title|default:"Delivery Notice" }}
      </h1>

      <p class="text-gray-500 mt-3">
        {{ message|default:"This action is not available at the moment." }}
      </p>

      <div class="mt-6 rounded-2xl bg-gray-50 border border-gray-100 p-4 text-sm text-gray-600">
        Please contact Hyperlink Networks if you believe this link should be available.
      </div>

    </div>
  </div>

</body>
</html>
